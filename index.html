<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edusense</title>

<style>
body {margin:0;font-family:Arial;background:linear-gradient(135deg,#0f172a,#1e293b);color:white;text-align:center}
.container {padding:20px}
button {padding:12px 20px;margin:10px;border:none;border-radius:12px;font-size:16px;cursor:pointer;transition:0.3s}
button:hover{transform:scale(1.05)}
.true{background:#22c55e}
.false{background:#ef4444}
.card {background:#1e293b;padding:20px;border-radius:20px;margin-top:20px;box-shadow:0 0 20px rgba(0,0,0,0.4)}
.hidden{display:none}
.stat {margin:10px 0;padding:10px;background:#0f172a;border-radius:10px}
input {padding:10px;border-radius:10px;border:none;margin-top:10px}
</style>
</head>

<body>
<div class="container">
<h1>🎓 Edusense</h1>

<!-- MENU -->
<div id="menu">
  <h2>Escolha o modo</h2>
  <button onclick="entrarAluno()">👨‍🎓 Estudante</button>
  <button onclick="loginProfessor()">👨‍🏫 Professor</button>
</div>

<!-- ALUNO -->
<div id="aluno" class="hidden">
  <h3 id="nome"></h3>

  <div id="entrarSala">
    <h3>Entrar em uma sala</h3>
    <input id="codigoSalaAluno" placeholder="Digite a senha da sala">
    <br>
    <button onclick="entrarNaSala()">Entrar</button>
  </div>

  <div id="jogo" class="hidden">
    <p id="score">Pontuação: 0</p>
    <div class="card">
      <h2 id="question"></h2>
      <button class="true" onclick="responder(true)">✔</button>
      <button class="false" onclick="responder(false)">✖</button>
    </div>
  </div>
</div>

<!-- PROFESSOR LOGIN -->
<div id="loginProf" class="hidden">
  <h2>Login Professor</h2>
  <input id="senhaProf" placeholder="Senha">
  <br>
  <button onclick="entrarProfessor()">Entrar</button>
</div>

<!-- PROFESSOR -->
<div id="professor" class="hidden">
  <h2>Painel do Professor</h2>

  <div id="criarSalaBox">
    <h3>Criar Sala</h3>
    <input id="codigoSala" placeholder="Crie uma senha">
    <br>
    <button onclick="criarSala()">Criar Sala</button>
  </div>

  <div id="painelSala" class="hidden">
    <h3>Sala ativa: <span id="salaAtual"></span></h3>

    <div class="stat">👥 Alunos na sala: <span id="alunosSala">0</span></div>
    <div class="stat">🏆 Pontuação média: <span id="mediaSala">0</span></div>
    <div class="stat">❓ Respostas totais: <span id="respostasTotal">0</span></div>
  </div>
</div>

<script>

let perguntas=[
  {texto:"2+2=4?",resposta:true},
  {texto:"12x12=144?",resposta:true},
  {texto:"10x2=50?",resposta:false}
];

let nivel=0, pontos=0;
let salaAtual="";
let alunos=0;
let respostas=0;
let somaPontos=0;

function entrarAluno(){
  menu.classList.add("hidden");
  aluno.classList.remove("hidden");

  let nome=prompt("Seu nome:");
  document.getElementById("nome").innerText="Aluno: "+nome;
}

function entrarNaSala(){
  let codigo=document.getElementById("codigoSalaAluno").value;

  if(codigo===salaAtual && salaAtual!=""){
    document.getElementById("entrarSala").classList.add("hidden");
    document.getElementById("jogo").classList.remove("hidden");
    alunos++;
    atualizarPainel();
    mostrarPergunta();
  } else {
    alert("Sala não encontrada");
  }
}

function loginProfessor(){
  menu.classList.add("hidden");
  loginProf.classList.remove("hidden");
}

function entrarProfessor(){
  let senha=document.getElementById("senhaProf").value;
  if(senha==="1234"){
    loginProf.classList.add("hidden");
    professor.classList.remove("hidden");
  } else alert("Senha errada");
}

function criarSala(){
  salaAtual=document.getElementById("codigoSala").value;

  if(salaAtual===""){
    alert("Digite uma senha válida");
    return;
  }

  alunos=0;
  respostas=0;
  somaPontos=0;

  document.getElementById("salaAtual").innerText=salaAtual;
  document.getElementById("painelSala").classList.remove("hidden");
}

function mostrarPergunta(){
  document.getElementById("question").innerText=perguntas[nivel].texto;
}

function responder(v){
  if(v===perguntas[nivel].resposta){
    pontos++;
  } else {
    pontos--;
  }

  if(pontos<0)pontos=0;

  nivel=(nivel+1)%perguntas.length;

  respostas++;
  somaPontos+=pontos;

  document.getElementById("score").innerText="Pontuação: "+pontos;

  mostrarPergunta();
  atualizarPainel();
}

function atualizarPainel(){
  document.getElementById("alunosSala").innerText=alunos;
  document.getElementById("respostasTotal").innerText=respostas;

  let media=alunos?Math.round(somaPontos/alunos):0;
  document.getElementById("mediaSala").innerText=media;
}



// ===== FIREBASE MULTIPLAYER =====

// COLE SUA CONFIG AQUI
const firebaseConfig = {
  apiKey: "SUA_CHAVE",
  authDomain: "SEU_DOMINIO",
  projectId: "SEU_ID"
};

import("https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js").then(({ initializeApp }) => {
  import("https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js").then(({ getFirestore, doc, setDoc, onSnapshot }) => {

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // CRIAR SALA ONLINE
    window.criarSala = async function(){
      salaAtual = document.getElementById("codigoSala").value;

      await setDoc(doc(db, "salas", salaAtual), {
        alunos: 0,
        respostas: 0
      });

      document.getElementById("salaAtual").innerText = salaAtual;
      document.getElementById("painelSala").classList.remove("hidden");
    }

    // ENTRAR NA SALA
    window.entrarNaSala = async function(){
      let codigo = document.getElementById("codigoSalaAluno").value;
      salaAtual = codigo;

      document.getElementById("entrarSala").classList.add("hidden");
      document.getElementById("jogo").classList.remove("hidden");

      const salaRef = doc(db, "salas", salaAtual);

      onSnapshot(salaRef, (docSnap) => {
        if(docSnap.exists()){
          let data = docSnap.data();
          document.getElementById("alunosSala").innerText = data.alunos;
          document.getElementById("respostasTotal").innerText = data.respostas;
        }
      });
    }

    // ATUALIZAR DADOS
    const oldResponder = responder;
    window.responder = async function(v){
      oldResponder(v);

      const salaRef = doc(db, "salas", salaAtual);

      await setDoc(salaRef, {
        alunos: alunos,
        respostas: respostas
      });
    }

  });
});

</script>
</body>
</html>
